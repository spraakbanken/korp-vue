  CQP is the "corpus query processor" component of the Korp software.
search.advanced.help.summary: Korp uses the IMS Open Corpus Workbench software, including its "corpus query processor" component (CQP). In the context of Korp, "CQP" practically means the query language used for searching. A typical query has conditions within square brackets that represent tokens (words) in sequence.
